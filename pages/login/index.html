  <div class="container">
    <!-- LEFT (desktop only) -->
    <section class="left-section" aria-hidden="false">
      <div class="svg-decoration" aria-hidden="true">

          <defs>
            <linearGradient id="desktopGrad" x1="465.5" y1="147" x2="-19.9865" y2="195.239" gradientUnits="userSpaceOnUse">
              <stop stop-color="#F5884E"/>
              <stop offset="1" stop-color="#8F4F2E"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="welcome-content" role="region" aria-label="Welcome">
        <h1 class="welcome-title">Welcome to DPCMS!</h1>
        <p class="welcome-subtitle">Let's make your work more organized and easily using the lorem Dashboard.</p>

        <div class="profile-images" aria-hidden="true">
          <div class="profile-image profile-1"><img src="../../assets/images/img1.jpg" alt=""></div>
          <div class="profile-image profile-2"><img src="../../assets/images/img2.jpg" alt=""></div>
          <div class="profile-image profile-3"><img src="../../assets/images/img3.jpg" alt=""></div>
          <div class="profile-image profile-4"><img src="../../assets/images/img4.jpg" alt=""></div>
        </div>
      </div>
    </section>

    <!-- RIGHT (form) -->
    <section class="right-section" aria-label="Login form">
      <div class="form-container">
        <div class="logo">
          <img src="../../assets/images/Logo.png" alt="DPCMS Logo" class="logo-image">
        </div>

        <h2 class="form-title">Member's Login Page</h2>
        <p class="form-subtitle">Join Destiny Promoters Cooperative Today</p>

        <form class="login-form" novalidate>
          <div class="form-group">
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
          </div>

          <div class="forgot-password">
            <a href="#" class="forgot-link">Forget Password?</a>
          </div>

          <button type="submit" class="submit-btn">Login</button>

          <p class="register-link">Don't have an account yet? <a href="/pages/register/">Register</a></p>
        </form>
      </div>
    </section>
  </div>
</body>
</html>
